name: Android CI

on:
  push:
    branches-ignore:
      - release
    tags:
      - 'f*'
      - 'p*'
  workflow_dispatch: {}

env:
  GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
  SIGN_KEY_PASSWORD: ${{ secrets.SIGN_KEY_PASSWORD }}

jobs:
  build-aab-free:
    if: "startsWith(github.ref, 'refs/tags/f') || (! startsWith(github.ref, 'refs/tags/') && ! contains(github.event.head_commit.message, '[pro]'))"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/hoang-rio/docker-linux-android-sdk:ndk-jdk21
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Import GPG key and run blackbox_postdeploy
        run: |
          set -e
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg2 --batch --yes --import -
            GPG=gpg2 blackbox_postdeploy || true
          fi

      - name: Java version
        run: java --version

      - name: Build OpenSSL headers
        run: |
          cd SoftEtherClient/src/main/cpp && ./build-openssl-android.sh --headers-only

      - name: Bundle Free Release AAB
        run: ./gradlew :app:bundleFreeRelease

      - name: Upload Free AAB
        uses: actions/upload-artifact@v7
        with:
          name: aab-free
          path: app/build/outputs/bundle/freeRelease/app-free-release.aab

  distribute-aab-free:
    needs: build-aab-free
    runs-on: ubuntu-latest

    steps:
      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: aab-free

      - name: Distribute to Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_FREE_APP_ID }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/service-account.json
          npm install -g firebase-tools
          firebase appdistribution:distribute app-free-release.aab --app $FIREBASE_APP_ID --testers "chiasenhac.us@gmail.com" --release-notes "Release: ${{ github.event.head_commit.message }}"

      - name: Delete AAB artifact
        uses: actions/delete-artifact@v4
        with:
          name: aab-free

  build-aab-pro:
    if: "startsWith(github.ref, 'refs/tags/p') || (! startsWith(github.ref, 'refs/tags/') && ! contains(github.event.head_commit.message, '[free]'))"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/hoang-rio/docker-linux-android-sdk:ndk-jdk21
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Import GPG key and run blackbox_postdeploy
        run: |
          set -e
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg2 --batch --yes --import -
            GPG=gpg2 blackbox_postdeploy || true
          fi

      - name: Java version
        run: java --version

      - name: Build OpenSSL headers
        run: |
          cd SoftEtherClient/src/main/cpp && ./build-openssl-android.sh --headers-only

      - name: Bundle Pro Release AAB
        run: ./gradlew :app:bundleProRelease

      - name: Upload Pro AAB
        uses: actions/upload-artifact@v7
        with:
          name: aab-pro
          path: app/build/outputs/bundle/proRelease/app-pro-release.aab

  distribute-aab-pro:
    needs: build-aab-pro
    runs-on: ubuntu-latest

    steps:
      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: aab-pro

      - name: Distribute to Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_PRO_APP_ID }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/service-account.json
          npm install -g firebase-tools
          firebase appdistribution:distribute app-pro-release.aab --app $FIREBASE_APP_ID --testers "chiasenhac.us@gmail.com" --release-notes "Release: ${{ github.event.head_commit.message }}"

      - name: Delete AAB artifact
        uses: actions/delete-artifact@v4
        with:
          name: aab-pro
